name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  # Interactive mode: responds to @claude mentions in comments, reviews, and issues.
  # No prompt — the action auto-detects event type, reads PR diffs, comments, and
  # CLAUDE.md for project conventions (recommended "tag mode").
  claude-interactive:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: claude-interactive-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Claude config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AndriyKalashnykov/claude-config
          token: ${{ secrets.CLAUDE_CONFIG_TOKEN }}
          path: .claude-config

      - name: Install Claude config
        run: bash .claude-config/setup.sh .claude-config && rm -rf .claude-config

      - name: Run Claude
        uses: anthropics/claude-code-action@f2accb9a171bd71f4b5c93bcea23876aa5244edb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # assignee_trigger: claude  # Uncomment to also trigger when issues are assigned to "claude"
          claude_args: "--max-turns 50"
          allowed_tools: "Bash,Edit,Read,Write,Glob,Grep,WebFetch,mcp__github_comment__update_claude_comment"

  # Automation mode: automatic code review on every non-draft PR open/update.
  # Prompt provided — runs in automation mode with scoped-down permissions (read-only content).
  claude-pr-review:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true # New push cancels stale review
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Setup Claude config
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: AndriyKalashnykov/claude-config
          token: ${{ secrets.CLAUDE_CONFIG_TOKEN }}
          path: .claude-config

      - name: Install Claude config
        run: bash .claude-config/setup.sh .claude-config && rm -rf .claude-config

      - name: Review PR
        uses: anthropics/claude-code-action@f2accb9a171bd71f4b5c93bcea23876aa5244edb # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Review this pull request for:
            - Compliance with project coding standards (see CLAUDE.md)
            - Test coverage (unit, handler, benchmark — 80%+ threshold)
            - Swagger annotation completeness on new/modified endpoints
            - Input validation and error handling patterns
            - Breaking changes to the API contract
            Use inline comments for code-specific feedback. Be concise.
          claude_args: "--max-turns 10 --allowedTools \"mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*)\""
