name: Auto-merge

on:
  pull_request:
    types: [opened, ready_for_review]

permissions: {}

concurrency:
  group: auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >-
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == 'AndriyKalashnykov'
    runs-on: ubuntu-latest
    permissions:
      # `gh pr merge --auto` triggers the enablePullRequestAutoMerge GraphQL
      # mutation, which requires contents: write in addition to
      # pull-requests: write — it gates on the caller's ability to write
      # to the default branch even though the actual merge is queued for
      # later. Removing contents: write makes the step fail with
      # "Resource not accessible by integration".
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        # `--repo` is required because the job has no `actions/checkout` step,
        # so cwd is not a git repo and `gh pr merge` cannot auto-detect the
        # remote — without this flag every run fails with
        # `fatal: not a git repository`.
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: gh pr merge "$PR" --auto --squash --repo "$REPO"
