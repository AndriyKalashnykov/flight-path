name: ci

run-name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Lint, security scan, vulncheck, secrets, CI lint
        run: |
          export PATH=$PATH:/home/runner/go/bin
          make static-check

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Trivy filesystem scan (MEDIUM - informational)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'MEDIUM'
          exit-code: '0'

  builds:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: server-binary
          path: server
          retention-days: 1

  tests:
    needs: [static-check]

    runs-on: ubuntu-latest
    name: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run unit tests
        run: make test

      - name: Run fuzz tests
        run: make fuzz

  integration:
    needs: [builds, tests]
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/

      - name: Install Newman
        run: |
          npm install --location=global newman

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: server-binary

      - name: Make binary executable
        run: chmod +x server

      - name: Run
        run: ./server -env-file .env &

      - name: Wait for REST API
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Postman/Newman end-to-end tests
        run: make e2e

  dast:
    needs: [integration]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: server-binary

      - name: Make binary executable
        run: chmod +x server

      - name: Start server
        run: |
          ./server -env-file .env &
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null 2>&1 && break
            sleep 1
          done

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        with:
          target: 'http://localhost:8080/swagger/doc.json'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          fail_action: true

  image-scan:
    needs: [builds]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        run: |
          docker buildx build --load \
            --build-arg GOMODCACHE=/go/pkg/mod \
            --build-arg GOCACHE=/root/.cache/go-build \
            -t flight-path:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: 'flight-path:scan'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  container-test:
    needs: [image-scan]
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        run: |
          docker buildx build --load \
            --build-arg GOMODCACHE=/go/pkg/mod \
            --build-arg GOCACHE=/root/.cache/go-build \
            -t flight-path:test .

      - name: Run container and health-check
        run: |
          docker run -d --name fp-test -p 8080:8080 -e SERVER_PORT=8080 --entrypoint sh flight-path:test -c "touch /tmp/.env && /main -env-file /tmp/.env"
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8080/ >/dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:8080/ || { echo "Health check failed"; docker logs fp-test; exit 1; }
          curl -sf -X POST http://localhost:8080/calculate \
            -H 'Content-Type: application/json' \
            -d '[["SFO","ATL"],["ATL","EWR"]]' || { echo "API test failed"; docker logs fp-test; exit 1; }
          echo "Container smoke test passed"

      - name: Cleanup
        if: always()
        run: docker rm -f fp-test 2>/dev/null || true
