name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # required by dorny/paths-filter on pull_request events

jobs:

  # Path-detection gate. Workflow always triggers; heavy jobs gate on the
  # `code` output below. Replaces trigger-level `paths-ignore`, which deadlocks
  # with Repository Rulesets (no synthetic success for required checks).
  #
  # Tag pushes always force `code=true` so the full CI pipeline (incl. e2e,
  # docker, goreleaser) runs on every release tag — preserves the original
  # "tags are unaffected by paths-ignore" guarantee. Without this, a tag
  # pointing at a doc-only commit would skip every gated job and goreleaser
  # would publish a release with zero tests run.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
      pull-requests: read   # required by dorny/paths-filter on pull_request events
    outputs:
      code: ${{ steps.decide.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          # Explicit base required for `act push` compatibility — act's synthetic
          # event payload omits repository.default_branch, which dorny would
          # otherwise fall back to. Set ONLY on push events: dorny ignores
          # `base:` on pull_request events and emits a "passed with annotations"
          # warning on every PR run when set unconditionally. Template form
          # avoids that warning on PRs while preserving act compatibility.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|specs/**|LICENSE|.gitignore|.claudeignore|.claude/**|benchmarks/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'
      # Tag pushes always force `code=true` so the full release pipeline runs
      # even if the tag points at a doc-only commit.
      - name: Decide code output
        id: decide
        env:
          FILTER_CODE: ${{ steps.filter.outputs.code }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=${FILTER_CODE}" >> "$GITHUB_OUTPUT"
          fi

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # needed for gitleaks / git history scans

      # Single source of truth for Go + every quality/security tool is
      # .mise.toml — mise-action reads it, installs everything, and caches the
      # mise-managed installs. Replaces actions/setup-go and the parallel
      # `~/.local/bin` + `~/go/bin` caches that were needed when tools were
      # installed piecemeal by the Makefile.
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Go module + build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Static check
        run: make static-check

  build:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Go module + build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Build
        run: make build

      - name: Upload build artifact
        if: ${{ vars.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: server-binary
          path: server
          retention-days: 1

  test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Go module + build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Test with coverage
        run: |
          make coverage
          make coverage-check

      - name: Run fuzz tests
        run: make fuzz

      - name: Upload coverage report
        if: ${{ vars.ACT != 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: covprof.out
          retention-days: 7

  integration-test:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Go module + build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Integration test
        run: make integration-test

  # MANDATORY e2e job for Go REST API projects — runs on every push AND under
  # act via `make ci-run`. No `vars.ACT` guard: the job falls back to building
  # the binary locally if artifact download fails (which it does under act),
  # so it works end-to-end in both environments. Language-specific e2e: Newman
  # + Postman collection for flight-path (Go REST API); swap for Playwright /
  # Cypress / Failsafe / pytest+requests as appropriate per project.
  e2e:
    needs: [changes, build, test]
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # Single source of truth for the e2e target URL. Both the wait-for-server
      # poll and Newman (via make e2e-quick → LOCAL_BASE) read it; no recipe
      # carries a literal `localhost:8080`.
      LOCAL_HOST: 127.0.0.1
      LOCAL_PORT: 8080

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise-action installs BOTH go (from .mise.toml) and node (from
      # .mise.toml, which mirrors .nvmrc). Replaces the parallel setup-go +
      # setup-node pair.
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Cache Go module + build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-mod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Cache Newman
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: test/node_modules
          key: newman-${{ runner.os }}-${{ hashFiles('test/pnpm-lock.yaml') }}

      - name: Download build artifact
        id: download-binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: server-binary

      # Fallback: rebuild if artifact download failed (e.g., under act,
      # cross-job artifact download is unreliable; continue-on-error + this
      # fallback make the job work in both GHA and act environments).
      - name: Build binary (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: make build

      - name: Start server
        run: |
          chmod +x server
          SERVER_PORT="${LOCAL_PORT}" ./server -env-file .env &
          ./scripts/wait-for-server.sh "http://${LOCAL_HOST}:${LOCAL_PORT}/"

      - name: Run Newman tests
        # make e2e-quick reads LOCAL_HOST + LOCAL_PORT from the job env.
        run: make e2e-quick

  # DAST scans the actually-built Docker image (Pattern A: clean image-index)
  # rather than the bare server binary. Catches container-level surface that
  # the binary doesn't carry — e.g., headers added by entrypoint scripts,
  # apk-upgrade-week deltas in the Alpine layer, USER permission gotchas.
  # The image is built once here using the GHA layer cache populated by the
  # docker job, so the scan is fast on a warm cache.
  dast:
    if: vars.ACT != 'true' && needs.changes.outputs.code == 'true'
    needs: [changes, static-check, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      # Host + port for the runner-local DAST target. Both env-driven so every
      # subsequent step uses the same canonical value — no `localhost`/`8080`
      # literals scattered through the recipe.
      DAST_HOST: 127.0.0.1
      DAST_HOST_PORT: 18080
      DAST_BASE_URL: http://127.0.0.1:18080
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # Weekly cache-bust for the apk upgrade layer keeps DAST honest about
      # base-image security drift even when the Dockerfile is unchanged.
      - name: Compute APK cache-bust week
        id: apk-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Build image for DAST
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: flight-path:dast
          build-args: |
            GOMODCACHE=/go/pkg/mod
            GOCACHE=/root/.cache/go-build
            APK_UPGRADE_WEEK=${{ steps.apk-week.outputs.week }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute ZAP cache key
        id: zap-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache ZAP Docker image
        id: zap-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/zap-image.tar
          key: zap-stable-${{ steps.zap-week.outputs.week }}

      - name: Load cached ZAP image
        if: steps.zap-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/zap-image.tar

      - name: Start container under test
        run: |
          set -euo pipefail
          # Container-internal port is read from .env.example so this recipe
          # has no literal port — same canonical source the binary itself reads.
          CONTAINER_PORT=$(awk -F= '/^SERVER_PORT=/{print $2; exit}' .env.example)
          docker run --rm -d --name fp-dast \
            -p "${DAST_HOST}:${DAST_HOST_PORT}:${CONTAINER_PORT}" \
            -e "SERVER_PORT=${CONTAINER_PORT}" \
            flight-path:dast
          for _ in $(seq 1 30); do
            curl -sf "${DAST_BASE_URL}/" >/dev/null 2>&1 && break
            sleep 1
          done

      - name: OWASP ZAP API scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        with:
          target: '${{ env.DAST_BASE_URL }}/swagger/doc.json'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          # The action otherwise tries to file a tracking issue on every
          # alert. We treat false positives via .zap/rules.tsv (canonical
          # IGNORE entries with rationale) rather than via auto-filed
          # issues, so disable the side effect — it also avoids needing
          # `issues: write` on this job, keeping permissions least-privilege.
          allow_issue_writing: false

      - name: Save ZAP image for cache
        if: steps.zap-cache.outputs.cache-hit != 'true'
        run: docker save ghcr.io/zaproxy/zaproxy:stable -o /tmp/zap-image.tar

      - name: Cleanup
        if: always()
        run: docker rm -f fp-dast 2>/dev/null || true

  # Release: binaries via GoReleaser. Tag-gated — only runs on v*.*.* pushes.
  # Anchor of the multi-artifact release: creates the GitHub Release object
  # that downstream artifacts (the Docker image) attach to. `docker` is
  # serialized after this via `needs:` so a tag either produces both
  # artifacts or none.
  goreleaser:
    # Explicit `code == 'true'` gate is redundant on tag pushes (the `changes`
    # job force-flips code=true on tags so the full release pipeline runs even
    # for doc-only commits), but stating it makes the gate self-documenting and
    # robust to future changes in the changes-detector job's tag handling.
    if: startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.code == 'true'
    needs: [changes, static-check, build, test, integration-test, e2e, dast]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write    # create GitHub Release with binaries, archives, checksums, changelog
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0   # goreleaser needs full history for changelog

      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      # goreleaser is already installed by mise-action (pinned in .mise.toml),
      # so invoke the binary directly — avoids goreleaser-action's parallel
      # installer and the second version pin that used to live in this step.
      - name: Run GoReleaser
        run: goreleaser release --clean -f ./.goreleaser.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Unified docker validation + release pipeline. Runs on every push/PR:
  # builds single-arch + Trivy scan + smoke test + multi-arch build (without
  # push). On v*.*.* tag pushes, additionally logs in to GHCR, pushes the
  # multi-arch image, and cosign-signs by digest. On non-tag pushes the login,
  # push, and cosign steps are skipped via step-level `if:` — the job runs to
  # completion and turns green, validating the full release pipeline on every
  # commit. Dockerfile regressions, multi-arch build issues, and cosign
  # installer breakage are caught on the commit that introduced them, not on
  # release day.
  #
  # `goreleaser` is in `needs:` for serialization on tag pushes — the GitHub
  # Release object must exist before the image is published, so a tag either
  # produces both artifacts or none. On non-tag pushes goreleaser is skipped
  # (treated as success by `needs:`), so docker still runs every push.
  docker:
    needs: [changes, static-check, build, test, integration-test, goreleaser]
    if: |
      !failure() && !cancelled() &&
      needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write    # exercised only by the tag-gated push step
      id-token: write    # exercised only by the tag-gated cosign sign step
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # mise installs container-structure-test (pinned in .mise.toml) and
      # surfaces it on PATH for the structure-test step below. Single source of
      # truth — no parallel CST_VERSION pin in this workflow.
      - name: Set up mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # Weekly cache-bust for the apk upgrade layer so the image picks up new
      # Alpine security patches even when the Dockerfile is unchanged.
      - name: Compute APK cache-bust week
        id: apk-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # docker/metadata-action lowercases the registry path automatically,
          # so this expands to ghcr.io/andriykalashnykov/flight-path even though
          # github.repository preserves owner casing. Dynamic form survives
          # repo rename/fork — see /harden-image-pipeline §"GHCR namespace rule".
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
        # Only apply `latest=true` on tag pushes so non-tag builds don't
        # generate spurious `:latest` tags in the local metadata.
          flavor: |
            latest=${{ startsWith(github.ref, 'refs/tags/') }}

      # =================================================================
      # GATE 1: Local single-arch build for scanning + smoke testing
      # =================================================================
      - name: Build image for scan
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: |
            flight-path:scan
            flight-path:local
          build-args: |
            GOMODCACHE=/go/pkg/mod
            GOCACHE=/root/.cache/go-build
            APK_UPGRADE_WEEK=${{ steps.apk-week.outputs.week }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =================================================================
      # GATE 2: Trivy image scan (CRITICAL/HIGH blocking)
      # =================================================================
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'flight-path:scan'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      # =================================================================
      # GATE 3: Smoke test the locally-built image
      # =================================================================
      - name: Smoke test
        run: make image-smoke-test

      - name: Stop smoke container
        if: always()
        run: docker rm -f fp-test 2>/dev/null || true

      # =================================================================
      # GATE 3b: Container structure test (Dockerfile metadata + binary)
      # =================================================================
      - name: Container structure test
        run: make image-structure-test

      # =================================================================
      # Multi-arch build — runs on EVERY push. Catches multi-arch build
      # regressions on the commit that introduced them. `push` is gated by
      # the ref: false on non-tag pushes (validation only), true on tags.
      # =================================================================
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pattern A default: clean image index so GHCR "OS / Arch" tab renders.
          # Cosign keyless signing (below, tag-gated) provides supply-chain
          # verification without buildkit's in-manifest attestations.
          provenance: false
          sbom: false
          build-args: |
            GOMODCACHE=/go/pkg/mod
            GOCACHE=/root/.cache/go-build
            APK_UPGRADE_WEEK=${{ steps.apk-week.outputs.week }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =================================================================
      # Post-push: cosign keyless signing (Sigstore OIDC). Tag-only.
      # =================================================================
      - name: Install cosign
        if: startsWith(github.ref, 'refs/tags/')
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with cosign
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "-> cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "${TAGS}"

  # Single branch-protection gate. Includes the `changes` detector + every
  # downstream job (incl. tag-gated goreleaser + docker) so on tag pushes
  # ci-pass only goes green once the full release publish has verified clean.
  # Skipped jobs (changes.code=false on doc-only PRs, goreleaser on non-tag
  # pushes, dast under act) are `result: 'skipped'`, which
  # `contains(needs.*.result, 'failure')` treats as non-failure — ci-pass
  # passes correctly.
  ci-pass:
    if: always()
    needs: [changes, static-check, build, test, integration-test, e2e, dast, goreleaser, docker]
    timeout-minutes: 2
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more jobs were cancelled"
            exit 1
          fi
          echo "All required jobs passed or were skipped."
