name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Lint, security scan, vulncheck, secrets, CI lint
        run: |
          export PATH=$PATH:/home/runner/go/bin
          make static-check

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: 'test/node_modules,.pnpm-store'

      - name: Trivy filesystem scan (MEDIUM - informational)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'MEDIUM'
          exit-code: '0'
          skip-dirs: 'test/node_modules,.pnpm-store'

  builds:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: server-binary
          path: server
          retention-days: 1

  tests:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    name: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify coverage threshold
        run: make coverage-check

      - name: Run fuzz tests
        run: make fuzz

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: coverage-report
          path: covprof.out
          retention-days: 7

  integration:
    if: ${{ vars.ACT != 'true' }}
    needs: [builds, tests]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*

      - name: Download build artifact
        id: download-binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: server-binary

      - name: Build binary (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: make build

      - name: Make binary executable
        run: chmod +x server

      - name: Run
        run: ./server -env-file .env &

      - name: Wait for REST API
        run: ./scripts/wait-for-server.sh

      - name: Run Postman/Newman end-to-end tests
        run: make e2e

  dast:
    if: ${{ vars.ACT != 'true' }}
    needs: [static-check, builds, tests]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Download build artifact
        id: download-binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: server-binary

      - name: Build binary (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: make build

      - name: Make binary executable
        run: chmod +x server

      - name: Start server
        run: |
          ./server -env-file .env &
          ./scripts/wait-for-server.sh

      - name: OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@bd24b11e76da11ab60302c8ae87f091cbb11f034 # v0.10.0
        with:
          target: 'http://localhost:8080/swagger/doc.json'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          fail_action: true

      - name: Cleanup
        if: always()
        run: pkill -f './server' 2>/dev/null || true

  image-scan:
    needs: [builds]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image
        run: |
          docker buildx build --load \
            --build-arg GOMODCACHE=/go/pkg/mod \
            --build-arg GOCACHE=/root/.cache/go-build \
            -t flight-path:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'flight-path:scan'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Save Docker image for reuse
        run: docker save flight-path:scan -o flight-path.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: docker-image
          path: flight-path.tar
          retention-days: 1

  container-test:
    if: ${{ vars.ACT != 'true' }}
    needs: [image-scan]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Docker image
        id: download-image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: docker-image

      - name: Load Docker image
        if: steps.download-image.outcome == 'success'
        run: docker load -i flight-path.tar

      - name: Build Docker image (fallback)
        if: steps.download-image.outcome == 'failure'
        run: |
          docker buildx build --load \
            --build-arg GOMODCACHE=/go/pkg/mod \
            --build-arg GOCACHE=/root/.cache/go-build \
            -t flight-path:scan .

      - name: Tag image for docker-test
        run: docker tag flight-path:scan flight-path:local

      - name: Smoke-test container
        run: make docker-test

      - name: Cleanup
        if: always()
        run: docker rm -f fp-test 2>/dev/null || true
