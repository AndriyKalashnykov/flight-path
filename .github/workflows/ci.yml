name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  pull_request:
    paths-ignore:
      - '*.md'
      - '!CLAUDE.md'
      - 'docs/**'
      - 'specs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.claudeignore'
      - '.claude/**'
      - 'benchmarks/**'
      - '**.png'
      - '**.jpg'
      - '**.gif'
      - '**.svg'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  static-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Cache Go tool binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Static check
        run: make static-check

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          skip-dirs: 'test/node_modules,.pnpm-store'

      - name: Trivy filesystem scan (MEDIUM - informational)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scanners: 'vuln,secret,misconfig'
          severity: 'MEDIUM'
          exit-code: '0'
          skip-dirs: 'test/node_modules,.pnpm-store'

  build:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Cache Go tool binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        run: make build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: server-binary
          path: server
          retention-days: 1

  test:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Cache Go tool binaries
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-${{ hashFiles('Makefile') }}

      - name: Test with coverage
        run: make coverage-check

      - name: Run fuzz tests
        run: make fuzz

      - name: Upload coverage artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: coverage-report
          path: covprof.out
          retention-days: 7

  integration:
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: lts/*

      - name: Cache Newman
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: test/node_modules
          key: newman-${{ runner.os }}-${{ hashFiles('test/pnpm-lock.yaml') }}

      - name: Download build artifact
        id: download-binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: server-binary

      - name: Build binary (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: make build

      - name: Make binary executable
        run: chmod +x server

      - name: Run
        run: ./server -env-file .env &

      - name: Wait for REST API
        run: ./scripts/wait-for-server.sh

      - name: Run Postman/Newman end-to-end tests
        run: make e2e

  dast:
    if: ${{ vars.ACT != 'true' }}
    needs: [build, test]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download build artifact
        id: download-binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: server-binary

      - name: Set up Go (fallback only)
        if: steps.download-binary.outcome == 'failure'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build binary (fallback)
        if: steps.download-binary.outcome == 'failure'
        run: make build

      - name: Make binary executable
        run: chmod +x server

      - name: Get ZAP cache key
        id: zap-week
        run: echo "week=$(date -u +%Y-W%V)" >> "$GITHUB_OUTPUT"

      - name: Cache ZAP Docker image
        id: zap-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: /tmp/zap-image.tar
          key: zap-stable-${{ steps.zap-week.outputs.week }}

      - name: Load cached ZAP image
        if: steps.zap-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/zap-image.tar

      - name: Start server
        run: |
          ./server -env-file .env &
          ./scripts/wait-for-server.sh

      - name: OWASP ZAP API scan
        uses: zaproxy/action-api-scan@5158fe4d9d8fcc75ea204db81317cce7f9e5453d # v0.10.0
        with:
          target: 'http://localhost:8080/swagger/doc.json'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          fail_action: true

      - name: Save ZAP image for cache
        if: steps.zap-cache.outputs.cache-hit != 'true'
        run: docker save ghcr.io/zaproxy/zaproxy:stable -o /tmp/zap-image.tar

      - name: Cleanup
        if: always()
        run: pkill -f './server' 2>/dev/null || true

  image-scan:
    needs: [static-check]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build image for scan
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          load: true
          tags: flight-path:scan
          build-args: |
            GOMODCACHE=/go/pkg/mod
            GOCACHE=/root/.cache/go-build
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: 'flight-path:scan'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Save Docker image for reuse
        run: docker save flight-path:scan -o flight-path.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        continue-on-error: true
        with:
          name: docker-image
          path: flight-path.tar
          retention-days: 1

  container-test:
    if: ${{ vars.ACT != 'true' }}
    needs: [image-scan]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Docker image
        id: download-image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: docker-image

      - name: Load Docker image
        if: steps.download-image.outcome == 'success'
        run: docker load -i flight-path.tar

      - name: Set up Docker Buildx (fallback)
        if: steps.download-image.outcome == 'failure'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build Docker image (fallback)
        if: steps.download-image.outcome == 'failure'
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          load: true
          tags: flight-path:scan
          build-args: |
            GOMODCACHE=/go/pkg/mod
            GOCACHE=/root/.cache/go-build
          cache-from: type=gha

      - name: Tag image for docker-test
        run: docker tag flight-path:scan flight-path:local

      - name: Smoke test
        run: make docker-smoke-test

      - name: Cleanup
        if: always()
        run: docker rm -f fp-test 2>/dev/null || true
