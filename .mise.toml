[tools]
# Language toolchains (Go version mirrors go.mod; node mirrors .nvmrc)
go = "1.26.3"
node = "24"

# Static analysis + security tooling — version-of-truth for local + CI.
# Tracked by Renovate's native `mise` manager (no custom regex needed).
golangci-lint = "2.11.4"
"aqua:securego/gosec" = "2.25.0"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.1.4"
gitleaks = "8.30.1"
actionlint = "1.7.12"
shellcheck = "0.11.0"
hadolint = "2.14.0"
trivy = "0.69.3"
act = "0.2.87"
goreleaser = "2.15.2"
"aqua:GoogleContainerTools/container-structure-test" = "1.22.1"

# Project-specific Go-installable tools — migrated off the parallel
# `go install` recipe in the Makefile so there's a single source of truth.
"go:github.com/swaggo/swag/v2/cmd/swag" = "2.0.0-rc5"
"go:golang.org/x/perf/cmd/benchstat" = "0.0.0-20260409210113-8e83ce0f7b1c"
